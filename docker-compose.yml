

services:
  stereocrafter:
    build: .
    ports:
      - "7860:7860"
    volumes:
      - ./input_source_clips:/workspace/WEBUI-StereoCrafter/input_source_clips
      - ./output_depthmaps:/workspace/WEBUI-StereoCrafter/output_depthmaps
      - ./output_splatted:/workspace/WEBUI-StereoCrafter/output_splatted
      - ./output_inpainted:/workspace/WEBUI-StereoCrafter/completed_output
      - ./final_videos:/workspace/WEBUI-StereoCrafter/final_videos
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860

    command: ["bash", "-c", "export PYTHONPATH=/workspace/WEBUI-StereoCrafter && bash runpod-docker-startup.sh"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  filebrowser:
    image: filebrowser/filebrowser:latest
    ports:
      - "8080:80"
    volumes:
      - F:\WEBUI-StereoCrafter\input_source_clips:/srv/input_source_clips
      - F:\WEBUI-StereoCrafter\output_depthmaps:/srv/output_depthmaps
      - F:\WEBUI-StereoCrafter\output_splatted:/srv/output_splatted
      - F:\WEBUI-StereoCrafter\output_inpainted:/srv/completed_output
      - F:\WEBUI-StereoCrafter\final_videos:/srv/final_videos
      - F:\WEBUI-StereoCrafter\filebrowser_db:/app
      - F:\WEBUI-StereoCrafter\empty-config.json:/config/settings.json
    entrypoint: ["sh", "-c"]
    command: ["filebrowser --database /app/filebrowser.db --root /srv --address 0.0.0.0 --port 80"]
    restart: unless-stopped
    depends_on:
      - stereocrafter

