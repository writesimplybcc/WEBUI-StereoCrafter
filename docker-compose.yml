version: '3.8'

services:
  stereocrafter:
    build: .
    ports:
      - "7860:7860"
    volumes:
      - ./input_source_clips:/app/input_source_clips
      - ./output_depthmaps:/app/output_depthmaps
      - ./output_splatted:/app/output_splatted
      - ./completed_output:/app/completed_output
      - ./final_videos:/app/final_videos
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  filebrowser:
    image: filebrowser/filebrowser:latest
    ports:
      - "8080:80"
    volumes:
      - ./input_source_clips:/srv/input_source_clips
      - ./output_depthmaps:/srv/output_depthmaps
      - ./output_splatted:/srv/output_splatted
      - ./completed_output:/srv/completed_output
      - ./final_videos:/srv/final_videos
      - ./filebrowser-data/filebrowser.db:/database/filebrowser.db
      - ./filebrowser-config:/config
    environment:
      - FB_BASEURL=/filebrowser
      - FB_USERNAME=${FB_USERNAME:-stereocrafter}
      - FB_PASSWORD=${FB_PASSWORD:-CHANGE_THIS_PASSWORD_BEFORE_DEPLOYMENT_12345}
    restart: unless-stopped
    depends_on:
      - stereocrafter